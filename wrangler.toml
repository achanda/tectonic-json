name = "json-schema-chat"
main = "src/index.js"
compatibility_date = "2025-01-15"

[placement]
mode = "smart"

[observability]
enabled = true

[vars]
AI_NAME = "@cf/meta/llama-3.3-70b-instruct-fp8-fast"
AI_MODELS = "@cf/meta/llama-3.3-70b-instruct-fp8-fast,@cf/meta/llama-3.1-8b-instruct"
AI_TEMPERATURE = "0"
AI_RETRY_ATTEMPTS = "2"
AI_MAX_TOKENS = "280"
AI_TIMEOUT_MS = "25000"
LOCAL_TECTONIC_RUNNER_URL = "http://127.0.0.1:8788"

[ai]
binding = "AI"

[assets]
directory = "./public"
binding = "ASSETS"
